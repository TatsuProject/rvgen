<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif">
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#202030">Coverage-directed auto-regression</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" fill="#64748b">--auto_regress --cov_directed : perturbs gen_opts per seed based on currently-missing bins</text>

  <!-- seed = 100 -->
  <g>
    <rect x="60" y="90" width="180" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="150" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">seed = 100</text>
    <text x="150" y="132" text-anchor="middle" font-size="10" fill="#475569">gen → sample</text>
    <text x="150" y="148" text-anchor="middle" font-size="10" fill="#475569">FENCE missing?</text>
    <text x="150" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">+ drop +no_fence=1</text>
  </g>

  <path d="M 240 130 L 270 130" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- seed = 101 -->
  <g>
    <rect x="280" y="90" width="180" height="80" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="370" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">seed = 101</text>
    <text x="370" y="132" text-anchor="middle" font-size="10" fill="#475569">gen → sample</text>
    <text x="370" y="148" text-anchor="middle" font-size="10" fill="#475569">JALR missing?</text>
    <text x="370" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">+ inject riscv_jalr_instr</text>
  </g>

  <path d="M 460 130 L 490 130" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- seed = 102 -->
  <g>
    <rect x="500" y="90" width="180" height="80" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="590" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">seed = 102</text>
    <text x="590" y="132" text-anchor="middle" font-size="10" fill="#475569">gen → sample</text>
    <text x="590" y="148" text-anchor="middle" font-size="10" fill="#475569">all goals met ✓</text>
    <text x="590" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">exit 0</text>
  </g>

  <!-- or plateau -->
  <path d="M 680 130 L 710 130" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <g>
    <rect x="720" y="90" width="180" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="810" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">plateau</text>
    <text x="810" y="132" text-anchor="middle" font-size="10" fill="#475569">N consecutive seeds</text>
    <text x="810" y="148" text-anchor="middle" font-size="10" fill="#475569">added zero new bins</text>
    <text x="810" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">bail (exit 1)</text>
  </g>

  <!-- CONVERGENCE box -->
  <g>
    <rect x="60" y="220" width="840" height="220" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="480" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Accumulated state</text>

    <!-- CoverageDB -->
    <rect x="80" y="262" width="230" height="158" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="195" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">CoverageDB</text>
    <text x="195" y="298" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">bin-wise sum across seeds</text>
    <text x="95" y="316" font-size="10" fill="#0f172a" font-family="monospace">opcode_cg:</text>
    <text x="95" y="330" font-size="10" fill="#0f172a" font-family="monospace">  ADD: 612</text>
    <text x="95" y="344" font-size="10" fill="#0f172a" font-family="monospace">  FENCE: 8   ← new in seed 100</text>
    <text x="95" y="358" font-size="10" fill="#0f172a" font-family="monospace">  JALR: 6    ← new in seed 101</text>
    <text x="95" y="372" font-size="10" fill="#0f172a" font-family="monospace">hazard_cg:</text>
    <text x="95" y="386" font-size="10" fill="#0f172a" font-family="monospace">  raw: 480, war: 210, waw: 120</text>
    <text x="95" y="406" font-size="10" fill="#64748b" font-family="monospace">→ coverage.json</text>

    <!-- convergence.json -->
    <rect x="335" y="262" width="270" height="158" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <text x="470" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">convergence.json</text>
    <text x="470" y="298" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">per-bin first-hit seed</text>
    <text x="350" y="316" font-size="10" fill="#0f172a" font-family="monospace">first_hit_seed:</text>
    <text x="350" y="330" font-size="10" fill="#0f172a" font-family="monospace">  opcode_cg.ADD: -1  (pre-existing)</text>
    <text x="350" y="344" font-size="10" fill="#0f172a" font-family="monospace">  opcode_cg.FENCE: 100</text>
    <text x="350" y="358" font-size="10" fill="#0f172a" font-family="monospace">  opcode_cg.JALR: 101</text>
    <text x="350" y="378" font-size="10" fill="#0f172a" font-family="monospace">new_bins_per_seed:</text>
    <text x="350" y="392" font-size="10" fill="#0f172a" font-family="monospace">  [1894, 56, 3]</text>
    <text x="350" y="412" font-size="10" fill="#64748b" font-family="monospace">→ suggest-seeds can replay 100</text>

    <!-- sparkline -->
    <rect x="630" y="262" width="250" height="158" rx="8" fill="#fef3c7" stroke="#b45309"/>
    <text x="755" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">log output</text>
    <text x="755" y="298" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">sparkline + per-seed status</text>
    <text x="640" y="318" font-size="10" fill="#0f172a" font-family="monospace">seed=100  goals=93/95  +1894</text>
    <text x="640" y="332" font-size="10" fill="#0f172a" font-family="monospace">seed=101  goals=94/95  +56</text>
    <text x="640" y="346" font-size="10" fill="#0f172a" font-family="monospace">seed=102  goals=95/95  +3 ✓</text>
    <text x="640" y="370" font-size="10" fill="#0f172a" font-family="monospace">convergence: █▁▁</text>
    <text x="640" y="384" font-size="10" fill="#0f172a" font-family="monospace">peak=1894 median=56</text>
    <text x="640" y="408" font-size="10" fill="#16a34a" font-family="monospace">goals met at seed=102</text>
  </g>

  <!-- feedback arrow loop -->
  <path d="M 150 170 Q 150 205 195 240" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <path d="M 370 170 Q 370 205 410 240" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <path d="M 590 170 Q 590 205 620 240" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="480" y="465" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Baseline rv32imc goals close in 1 seed with directed mode (vs 8+ for blind seed-sweep).</text>
</svg>

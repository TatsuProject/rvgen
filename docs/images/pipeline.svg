<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect width="960" height="320" fill="#ffffff"/>

  <!-- title -->
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#202030">Generation pipeline — gen → gcc → iss → cov</text>

  <!-- lane label -->
  <text x="40" y="70" font-size="11" fill="#888" font-weight="600">INPUT</text>
  <text x="40" y="150" font-size="11" fill="#888" font-weight="600">STAGES</text>
  <text x="40" y="260" font-size="11" fill="#888" font-weight="600">OUTPUT</text>

  <!-- INPUT BOX: testlist + goals -->
  <g>
    <rect x="100" y="48" width="180" height="60" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="190" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#20204a">testlist.yaml</text>
    <text x="190" y="90" text-anchor="middle" font-size="11" fill="#4a4a66">+ goals (CGF YAML)</text>
    <text x="190" y="102" text-anchor="middle" font-size="11" fill="#4a4a66">+ target name</text>
  </g>

  <!-- arrow to stages -->
  <path d="M 190 108 L 190 135" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- STAGE BOXES -->
  <g>
    <!-- gen -->
    <rect x="100" y="140" width="140" height="80" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <text x="170" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">gen</text>
    <text x="170" y="180" text-anchor="middle" font-size="10" fill="#334155">AsmProgramGen</text>
    <text x="170" y="194" text-anchor="middle" font-size="10" fill="#334155">emits .S</text>
    <text x="170" y="208" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">+ samples CoverageDB</text>
  </g>

  <g>
    <!-- gcc_compile -->
    <rect x="280" y="140" width="140" height="80" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="350" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">gcc_compile</text>
    <text x="350" y="180" text-anchor="middle" font-size="10" fill="#334155">riscv64-…-gcc</text>
    <text x="350" y="194" text-anchor="middle" font-size="10" fill="#334155">.S → .o + .bin</text>
  </g>

  <g>
    <!-- iss_sim -->
    <rect x="460" y="140" width="140" height="80" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="530" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">iss_sim</text>
    <text x="530" y="180" text-anchor="middle" font-size="10" fill="#334155">spike -l --log-commits</text>
    <text x="530" y="194" text-anchor="middle" font-size="10" fill="#334155">exec + trace</text>
  </g>

  <g>
    <!-- cov -->
    <rect x="640" y="140" width="140" height="80" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
    <text x="710" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">cov</text>
    <text x="710" y="180" text-anchor="middle" font-size="10" fill="#334155">trace → runtime bins</text>
    <text x="710" y="194" text-anchor="middle" font-size="10" fill="#334155">+ compare to goals</text>
  </g>

  <!-- connecting arrows between stages -->
  <path d="M 240 180 L 275 180" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 420 180 L 455 180" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 600 180 L 635 180" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- arrows from stages to outputs -->
  <path d="M 170 220 L 170 246" stroke="#0369a1" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 350 220 L 350 246" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 530 220 L 530 246" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 710 220 L 710 246" stroke="#be185d" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- OUTPUT ARTIFACT BOXES -->
  <g>
    <rect x="100" y="250" width="140" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="170" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">asm_test/*.S</text>
    <text x="170" y="286" text-anchor="middle" font-size="10" fill="#475569">(+ seed_archive/)</text>
  </g>
  <g>
    <rect x="280" y="250" width="140" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="350" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">asm_test/*.o</text>
    <text x="350" y="286" text-anchor="middle" font-size="10" fill="#475569">asm_test/*.bin</text>
  </g>
  <g>
    <rect x="460" y="250" width="140" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="530" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">spike_sim/*.log</text>
    <text x="530" y="286" text-anchor="middle" font-size="10" fill="#475569">spike_sim/*.trace</text>
  </g>
  <g>
    <rect x="640" y="250" width="140" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="710" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">coverage.json</text>
    <text x="710" y="286" text-anchor="middle" font-size="10" fill="#475569">coverage_report.txt</text>
  </g>

  <!-- marker defs -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- foot note -->
  <text x="480" y="312" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Every stage is optional via --steps (comma-separated). Coverage DB accumulates across runs.</text>
</svg>

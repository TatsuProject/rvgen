# Packaged baseline testlist — shipped inside the rvgen wheel.
#
# This is the fallback that ``rvgen`` resolves when:
#   * ``--testlist`` is not provided, AND
#   * no user-area testlist exists, AND
#   * the riscv-dv root doesn't contain ``target/<T>/testlist.yaml``.
#
# It lets ``pip install rvgen`` produce a self-contained tool — no
# external riscv-dv clone required for a basic random regression. To
# customise per-target plusargs, drop a YAML at
# ``<user_dir>/testlists/<target>.yaml`` (see ``user/`` template).
#
# Format (riscv-dv compatible — see riscv_dv_root/yaml/base_testlist.yaml):
#   test         : test name passed via --test
#   iterations   : default iteration count
#   description  : human-readable
#   gen_opts     : "+plusarg=value" string concatenated onto cli args
#   gen_test     : SV-side generator class name (unused by rvgen)
#   rtl_test     : RTL-side simulation test name (unused by rvgen)

- test: riscv_arithmetic_basic_test
  description: >
    Arithmetic instructions only — no load/store, no branch, no CSR.
    Useful smoke test that exercises the random-pick + post-process
    paths without any memory subsystem.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=5000
    +num_of_sub_program=0
    +directed_instr_0=riscv_int_numeric_corner_stream,4
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +no_load_store=1
    +boot_mode=m
    +no_csr_instr=1
  rtl_test: core_base_test

- test: riscv_rand_instr_test
  description: >
    Random-mix instruction stress test — the canonical "kitchen-sink"
    test. Mixes ALU, load/store, branch, jump, and the standard
    directed streams (loops, hazards, multi-page).
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +directed_instr_1=riscv_loop_instr,4
    +directed_instr_2=riscv_hazard_instr_stream,4
    +directed_instr_3=riscv_load_store_hazard_instr_stream,4
    +directed_instr_4=riscv_multi_page_load_store_instr_stream,4
    +directed_instr_5=riscv_mem_region_stress_test,4
    +directed_instr_6=riscv_jal_instr,4
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_jump_stress_test
  description: >
    Back-to-back jump-heavy stress test. Useful for branch-predictor
    and RAS coverage.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=5000
    +num_of_sub_program=5
    +directed_instr_1=riscv_jal_instr,20
    +no_csr_instr=1
    +no_load_store=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_loop_test
  description: >
    Random instructions with bounded backward-branch loops.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +directed_instr_0=riscv_loop_instr,20
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_rand_jump_test
  description: >
    Random jumps mixed with arithmetic — exercises call-stack depth
    and indirect-jump paths.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +directed_instr_0=riscv_jal_instr,20
    +directed_instr_1=riscv_loop_instr,4
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_mmu_stress_test
  description: >
    Multi-page load/store stream — exercises page-cross + cache-line
    crossing coverage.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +directed_instr_0=riscv_multi_page_load_store_instr_stream,20
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_non_compressed_instr_test
  description: >
    Random-mix without RVC — useful when a target's RVC decoder is
    unstable and you want pure 32-bit instructions.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +disable_compressed_instr=1
    +directed_instr_1=riscv_loop_instr,4
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_floating_point_arithmetic_test
  description: >
    FP-only arithmetic — for F/D-extension targets.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=0
    +no_branch_jump=1
    +no_load_store=1
    +no_csr_instr=1
    +no_fence=1
    +no_data_page=1
    +enable_floating_point=1
  rtl_test: core_base_test

- test: riscv_floating_point_rand_test
  description: >
    FP mixed with integer ops + load/store.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +enable_floating_point=1
    +directed_instr_1=riscv_loop_instr,4
    +directed_instr_2=riscv_hazard_instr_stream,4
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_amo_test
  description: >
    A-extension stress — AMO/LR/SC instructions.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +enable_atomic_extension=1
    +directed_instr_0=riscv_lr_sc_instr_stream,8
    +directed_instr_1=riscv_amo_instr_stream,16
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_b_ext_test
  description: >
    Bitmanip (B-extension) instruction mix.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +directed_instr_1=riscv_loop_instr,4
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_vector_arithmetic_test
  description: >
    Vector (RVV) arithmetic — for V-extension targets.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=0
    +enable_vector_extension=1
    +no_csr_instr=1
    +no_fence=1
  rtl_test: core_base_test

- test: riscv_privileged_mode_rand_test
  description: >
    Privileged-mode randomization — boot via M, exercise S/U trap paths.
  iterations: 2
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=2000
    +num_of_sub_program=5
    +set_mstatus_mprv=1
    +directed_instr_1=riscv_loop_instr,4
  rtl_test: core_base_test

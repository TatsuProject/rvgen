# Baseline functional-coverage goals for rvgen.
#
# Each top-level key is a covergroup name (as defined in collectors.py).
# Under each covergroup, each key is a bin name with the required hit count.
# A hit count of 0 marks the bin as "optional" — it shows up in reports but
# does not block auto-regression's "goals met" status.
#
# This file targets a solid rv32imc-style regression. Targets with extra
# extensions (floating-point, vector, crypto) should supply additional
# goals files that extend this one via YAML merge or the --goals-file CLI
# flag (currently: union per bin, last-writer wins on required count).

opcode_cg:
  # RV32I — hit every arithmetic / logical / compare / branch / ld-st op.
  LUI: 5
  AUIPC: 5
  JAL: 10
  JALR: 5
  BEQ: 5
  BNE: 5
  BLT: 5
  BGE: 5
  BLTU: 5
  BGEU: 5
  LB: 3
  LH: 3
  LW: 3
  LBU: 3
  LHU: 3
  SB: 3
  SH: 3
  SW: 3
  ADDI: 20
  SLTI: 5
  SLTIU: 5
  XORI: 5
  ORI: 5
  ANDI: 5
  SLLI: 10
  SRLI: 10
  SRAI: 10
  ADD: 20
  SUB: 10
  SLL: 5
  SLT: 5
  SLTU: 5
  XOR: 5
  SRL: 5
  SRA: 5
  OR: 5
  AND: 5
  FENCE: 2
  # Privileged / system ops (may be gated off by +no_ebreak=1 etc.; set
  # required=0 so they're optional).
  ECALL: 0
  EBREAK: 0
  MRET: 0

format_cg:
  R_FORMAT: 50
  I_FORMAT: 50
  S_FORMAT: 10
  B_FORMAT: 20
  U_FORMAT: 10
  J_FORMAT: 5
  # Compressed formats — also optional (only hit on RVC targets).
  CR_FORMAT: 0
  CI_FORMAT: 0
  CB_FORMAT: 0
  CJ_FORMAT: 0

category_cg:
  ARITHMETIC: 100
  LOGICAL: 50
  COMPARE: 20
  SHIFT: 30
  BRANCH: 20
  JUMP: 5
  LOAD: 10
  STORE: 10
  SYSTEM: 0        # optional — only hit when no_ebreak/ecall/wfi are off
  SYNCH: 2
  CSR: 0           # optional — only when no_csr_instr=0

group_cg:
  RV32I: 100
  RV32M: 0         # optional — M-extension targets only
  RV32C: 0         # optional
  RV32A: 0
  RV32F: 0
  RV32D: 0
  RV64I: 0         # optional — RV64 targets only
  RVV: 0

rs1_cg:
  ZERO: 3
  RA: 3
  SP: 3
  GP: 0
  TP: 0
  T0: 3
  T1: 3
  S0: 3
  A0: 3
  A5: 3
  S11: 3
  T6: 3

rs2_cg:
  ZERO: 3
  RA: 3
  T0: 3
  A0: 3
  A5: 3
  S11: 3
  T6: 3

rd_cg:
  RA: 3
  T0: 3
  S0: 3
  A0: 3
  A5: 3
  S11: 3
  T6: 3
  # ZERO / SP / TP / GP typically reserved or special-cased; optional.
  ZERO: 0
  SP: 0
  TP: 0
  GP: 0

imm_sign_cg:
  pos: 100
  neg: 100
  zero: 20

hazard_cg:
  raw: 50
  war: 50
  waw: 30
  none: 100

fp_rm_cg:
  RNE: 0
  RTZ: 0
  RDN: 0
  RUP: 0
  RMM: 0

vtype_cg:
  # Optional — only populated on vector targets and when we sample vector cfg.
  SEW32_LMUL1: 0

csr_cg:
  MSCRATCH: 0
  MSTATUS: 0
  MISA: 0
  MIE: 0
  MTVEC: 0

fmt_category_cross:
  R_FORMAT__ARITHMETIC: 20
  I_FORMAT__ARITHMETIC: 20
  I_FORMAT__LOAD: 5
  S_FORMAT__STORE: 5
  B_FORMAT__BRANCH: 20
  U_FORMAT__ARITHMETIC: 5
  J_FORMAT__JUMP: 3

category_group_cross:
  ARITHMETIC__RV32I: 50
  LOGICAL__RV32I: 30
  BRANCH__RV32I: 20

# Sprint-1 coverage-gap closures — see collectors.py CG_FP_FFLAGS et al.
# Most are runtime-only on the M/S CSR write side; baseline targets a
# couple of hits each so the dashboard surfaces them as expected bins.
fp_fflags_cg:
  no_flags: 0
  nx_set: 0
  uf_set: 0
  of_set: 0
  dz_set: 0
  nv_set: 0
  multiple_flags: 0

trap_cause_cg:
  exception_02_illegal_instruction: 0
  exception_03_breakpoint: 0
  exception_08_ecall_u: 0
  exception_09_ecall_s: 0
  exception_11_ecall_m: 0
  exception_12_instr_page_fault: 0
  exception_13_load_page_fault: 0
  exception_15_store_amo_page_fault: 0
  interrupt_07_m_timer: 0
  interrupt_11_m_external: 0
  interrupt_03_m_software: 0

op_comb_cg:
  rd_eq_rs1_eq_rs2: 0
  rs1_is_sp: 0
  rs1_is_ra: 0
  rd_is_sp: 0
  rd_is_ra: 0
  rd_is_zero: 0

ea_align_cg:
  align_1: 0
  align_2: 0
  align_4: 0
  align_8: 0
  align_16: 0
  align_32: 0
  align_64: 0

csr_read_cg:
  MSCRATCH: 0
  MSTATUS: 0
  MTVEC: 0
  MEPC: 0
  MCAUSE: 0

fp_dataset_cg:
  pos_zero: 0
  neg_zero: 0
  pos_inf: 0
  neg_inf: 0
  qnan: 0
  snan: 0
  pos_subnormal: 0
  neg_subnormal: 0
  pos_normal_min: 0
  pos_normal_max: 0
  pos_one: 0
  neg_one: 0
  generic: 0

# ---------------------------------------------------------------------------
# Sprint-2 deep-coverage additions — goals for the new covergroups added
# from the riscv-isac / core-v-verif / ARM verification-plan research.
# Most are required≥1 (so a missing bin shows up as red on the dashboard
# but doesn't gate auto-regression). Pipeline depth + load-use are set
# to required≥3 because they're the headline gap closures.
# ---------------------------------------------------------------------------

# Pipeline depth — distance buckets between RAW producer and consumer.
hazard_distance_cg:
  dist_1_load_use: 3
  dist_2: 3
  dist_3: 1
  dist_4_5: 1
  dist_6_7: 0
  dist_8_plus: 0

# Load-use coverage — load → consumer distance.
load_use_dist_cg:
  load_use_1_load_use: 3
  load_use_2: 1
  load_use_3: 1
  load_use_4_5: 0
  load_no_use: 0

# Multi-cycle producer (MUL/DIV/FDIV/FSQRT/AMO) consumer-distance.
mc_producer_use_dist_cg:
  mc_use_1_load_use: 0
  mc_use_2: 0
  mc_use_3: 0
  mc_no_use: 0

# Branch shadow — instruction category in the slot following a branch.
branch_shadow_cg:
  shadow_ARITHMETIC: 0
  shadow_LOAD: 0
  shadow_STORE: 0
  shadow_BRANCH: 0
  shadow_LOGICAL: 0
  shadow_SHIFT: 0
  shadow_JUMP: 0

# Static memory aliasing inside an 8-instruction window.
mem_alias_cg:
  store_then_load_same_addr: 0
  store_then_load_same_base_diff_off: 0
  store_then_store_same_addr: 0
  load_then_load_same_addr: 0
  load_then_store_same_addr: 0
  no_alias_in_window: 0

# Branch 4-gram pattern — 16 possible patterns. Optional, dashboard-only.
branch_pattern4_cg:
  TTTT: 0
  TTTN: 0
  NNNN: 0
  TNTN: 0
  NTNT: 0
  TTNN: 0
  NNTT: 0

branch_loop_cg:
  fwd_taken: 0
  bwd_taken: 0
  fall_through: 0

# RAS classification.
ras_cg:
  call: 0
  return: 0
  coroutine_swap: 0
  computed: 0
  tail_call: 0

jalr_target_class_cg:
  ra: 0
  saved: 0
  argument: 0
  temporary: 0

# AMO aq/rl — 4 bins; aq_and_rl flagged if randomizer ever picks both.
amo_aqrl_cg:
  neither: 0
  aq_only: 0
  rl_only: 0
  aq_and_rl: 0

amo_op_width_cg:
  AMOADD_W: 0
  LR_W: 0
  SC_W: 0

# FP semantic op + RM/precision crosses.
fp_op_class_cg:
  add: 0
  sub: 0
  mul: 0
  div: 0
  sqrt: 0
  fma: 0
  minmax: 0
  compare: 0
  convert: 0
  sign: 0
  classify: 0
  move: 0
  load: 0
  store: 0

# MSTATUS field decode — sampled when MSTATUS/SSTATUS is written.
mstatus_field_cg:
  MSTATUS__mie_set: 0
  MSTATUS__mpie_set: 0
  MSTATUS__mpp_M: 0
  MSTATUS__mpp_S: 0
  MSTATUS__mpp_U: 0
  MSTATUS__mprv_set: 0
  MSTATUS__sum_set: 0
  MSTATUS__mxr_set: 0

# xTVEC mode — DIRECT vs VECTORED.
xtvec_mode_cg:
  mtvec_direct: 0
  mtvec_vectored: 0
  stvec_direct: 0
  stvec_vectored: 0

# Trap-delegation events — a few common ones.
delegation_cg:
  medeleg_breakpoint: 0
  medeleg_ecall_u: 0
  medeleg_load_page_fault: 0
  mideleg_s_timer: 0
  mideleg_s_external: 0

# HPM perf-counter access.
hpm_access_cg:
  mcycle: 0
  minstret: 0
  counter_3: 0
  counter_4: 0
  event_3: 0

# MISA letter bits.
misa_cg:
  misa_I: 0
  misa_M: 0
  misa_C: 0
  misa_A: 0
  misa_F: 0
  misa_D: 0
  misa_V: 0
  misa_S: 0
  misa_U: 0
  misa_H: 0

# MIP / MIE / MISA field decodes.
mip_field_cg:
  MIP__mtip_pending: 0
  MIP__msip_pending: 0
  MIP__meip_pending: 0
  MIP__none_pending: 0

# M-extension corner values.
mul_div_corner_cg:
  div_by_zero: 0
  signed_overflow: 0
  mul_max_pair: 0
  mul_neg_one_pair: 0

# Bitmanip semantic op.
bitmanip_op_cg:
  rotate: 0
  clz: 0
  ctz: 0
  popcount: 0
  minmax: 0
  clmul: 0
  single_bit: 0
  logic_neg: 0
  pack: 0
  byte_reverse: 0
  shift_add: 0
  extend: 0

# RVC immediate corners (sampled when generator emits compressed ops).
c_imm_corner_cg:
  c_addi_zero_imm: 0
  c_addi_imm_one: 0
  c_addi_imm_large: 0

# Walking-ones / -zeros / alternating / leading-trailing — riscv-isac
# CGF abstract-bin functions. Sampled at runtime from GPR writes.
walking_ones_cg:
  bit_00_set: 0
  bit_07_set: 0
  bit_15_set: 0
  bit_31_set: 0
  bit_63_set: 0

walking_zeros_cg:
  bit_00_clear: 0
  bit_31_clear: 0
  bit_63_clear: 0

alternating_pattern_cg:
  alt_5555: 0
  alt_AAAA: 0
  alt_byte_A5: 0
  alt_byte_5A: 0

leading_trailing_cg:
  lead0_64: 0
  lead0_32: 0
  trail0_4: 0
  trail0_8: 0
  lead1_64: 0
  trail1_4: 0

# Shamt boundary corners.
shamt_corner_cg:
  slli_shamt_zero: 0
  slli_shamt_one: 0
  slli_shamt_max_minus_one: 0
  srli_shamt_zero: 0

# Vsetvl AVL paths.
vsetvl_avl_path_cg:
  vsetvli_normal: 0
  vsetvli_set_vlmax: 0
  vsetvli_keep_vl: 0
  vsetivli_imm_avl: 0

# Vector register-group overlap.
vreg_overlap_cg:
  full_overlap: 0
  partial_overlap: 0
  no_overlap: 0

# MXR × SUM × MPRV cross — sampled per-load/store. Coarse-grained
# baseline goals; per-target overlays can demand more.
mxr_sum_mprv_cross_cg:
  M_mode__mxr0__sum0__mprv0: 0
  M_mode__mxr1__sum0__mprv0: 0
  M_mode__mxr0__sum1__mprv0: 0
  M_mode__mxr0__sum0__mprv1: 0

# FCVT corners, virtual-instr trap, WFI, atomic alignment.
fcvt_corner_cg:
  fcvt_w_s_nan_input: 0
  fcvt_w_s_inf_input: 0
  fcvt_lu_d_nan_input: 0

virtual_instr_trap_cg:
  vi_wfi: 0
  vi_sfence: 0
  vi_csr: 0

wfi_corner_cg:
  wfi_tw0: 0
  wfi_tw1: 0

atomic_alignment_cg:
  aligned_w: 0
  aligned_d: 0
  misaligned_w: 0
  misaligned_d: 0

# DCSR cause decode.
dcsr_cause_cg:
  dcsr_cause_1_ebreak: 0
  dcsr_cause_2_trigger: 0
  dcsr_cause_4_step: 0

# Nested trap detection.
nested_trap_cg:
  nested_M_in_trap: 0
  nested_S_in_trap: 0
  no_nesting: 0

# FP source class — sampled per-FP-op when at least one src FPR is known.
fp_src_class_cg:
  src_zero: 0
  src_inf: 0
  src_nan: 0
  src_subnormal: 0
  src_normal: 0
